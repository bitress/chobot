<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ChoBot Dashboard</title>
  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="https://cdn.chopaeng.com/icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.chopaeng.com/icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.chopaeng.com/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="https://cdn.chopaeng.com/icons/apple-touch-icon.png" />
  <link rel="manifest" href="https://cdn.chopaeng.com/icons/site.webmanifest" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Font Awesome 6 Free -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='css/dashboard.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="logo-box mx-auto mb-3" style="width:60px;height:60px;border-radius:18px;overflow:hidden;">
        <img src="https://cdn.chopaeng.com/logo.webp" alt="ChoBot"
             style="width:100%;height:100%;object-fit:contain;">
      </div>
      <h1 class="ac-font mb-1" style="color:var(--nook-green);font-size:1.8rem;">ChoBot</h1>
      <p class="x-small fw-bold text-uppercase letter-spacing-1" style="color:#aaa;">Moderator Dashboard</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert {% if category == 'error' %}alert-danger{% else %}alert-success{% endif %}
                     border-0 rounded-3 py-2 px-3 mb-3 shadow-sm" style="font-weight:700;font-size:.85rem;">
          <i class="bi {% if category == 'error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %} me-1"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Discord OAuth2 (primary) -->
    {% if oauth_configured %}
    <a href="{{ url_for('dashboard.oauth2_redirect') }}"
       class="btn w-100 py-2 rounded-3 fw-bold mb-3 d-flex align-items-center justify-content-center gap-2"
       style="background:#5865F2;color:#fff;font-size:.95rem;border:none;border-radius:14px!important;">
      <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
      Log in with Discord
    </a>

    <div class="d-flex align-items-center gap-2 mb-3">
      <div style="flex:1;height:1px;background:#e1e6d3;"></div>
      <span class="x-small fw-bold" style="color:#ccc;">or</span>
      <div style="flex:1;height:1px;background:#e1e6d3;"></div>
    </div>
    {% endif %}

    <!-- Secret key fallback form -->
    <form method="POST" action="{{ url_for('dashboard.login') }}">
      <label class="db-label">Secret Key</label>
      <div class="input-group mb-3" style="border:2px solid #e1e6d3;border-radius:12px;overflow:hidden;background:var(--nook-cream);">
        <span class="input-group-text border-0" style="background:transparent;color:#aaa;">
          <i class="bi bi-key-fill"></i>
        </span>
        <input type="password" name="secret" autofocus
               placeholder="Enter mod secret key"
               class="form-control border-0 shadow-none"
               style="background:transparent;font-family:var(--font-main);font-weight:600;font-size:.9rem;color:#555;">
      </div>
      <button type="submit"
              class="btn btn-nook-primary w-100 py-2 rounded-3 fw-bold"
              style="font-size:.95rem;border-radius:14px!important;">
        <i class="bi bi-door-open-fill me-2"></i>Log In
      </button>
    </form>

    <p class="text-center x-small mt-4" style="color:#ccc;font-weight:700;">
      ChoBot &mdash; ACNH Island Management
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmEtmT49YJZBtX+mHJFsxnXMoaZX"
        crossorigin="anonymous"></script>
</body>
</html>
